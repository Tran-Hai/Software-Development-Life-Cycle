version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sdlc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdlc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdlc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sdlc_platform}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sdlc}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  redis:
    image: redis:7-alpine
    container_name: sdlc-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  minio:
    image: minio/minio:latest
    container_name: sdlc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '9001:9001'
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sdlc-network

  minio-init:
    image: minio/mc:latest
    container_name: sdlc-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minio_secret};
      mc mb myminio/${MINIO_BUCKET:-sdlc-uploads} --ignore-existing;
      mc anonymous set download myminio/${MINIO_BUCKET:-sdlc-uploads};
      exit 0;
      "
    networks:
      - sdlc-network

networks:
  sdlc-network:
    driver: bridge
