services:
  - type: web
    name: sdlc-platform
    env: node
    buildCommand: |
      cd packages/frontend
      npm install
      npx prisma generate
      npm run build
    startCommand: cd packages/frontend && npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
